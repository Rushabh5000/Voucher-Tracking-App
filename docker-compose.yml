version: "3.9"

services:
  # ─── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vt-postgres
    environment:
      POSTGRES_DB:       voucher_tracker
      POSTGRES_USER:     voucher_user
      POSTGRES_PASSWORD: voucher_pass
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voucher_user -d voucher_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Backend API ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vt-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:       postgresql://voucher_user:voucher_pass@postgres:5432/voucher_tracker
      PORT:               3001
      NODE_ENV:           production
      FRONTEND_URL:       http://localhost:5173
      # Email — override in .env or here:
      SMTP_HOST:          ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT:          ${SMTP_PORT:-587}
      SMTP_USER:          ${SMTP_USER:-}
      SMTP_PASS:          ${SMTP_PASS:-}
      REPORT_RECIPIENT:   ${REPORT_RECIPIENT:-}
    ports:
      - "3001:3001"
    restart: unless-stopped

  # ─── Frontend ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vt-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  pg-data:
