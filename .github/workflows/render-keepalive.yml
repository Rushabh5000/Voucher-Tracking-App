name: Render keep-alive

on:
  schedule:
    # Every 10 minutes — Render free web services hibernate after ~15 min of inactivity.
    - cron: "*/10 * * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        env:
          # Set this repo secret to your Render backend base URL,
          # e.g. https://voucher-tracker-api.onrender.com
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "BACKEND_URL secret is not set — skipping."; exit 0
          fi
          echo "Pinging $BACKEND_URL/api/health"
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 --retry 3 --retry-delay 20 "$BACKEND_URL/api/health")
          echo "HTTP $code"
          # 2xx keeps it warm; a woken-from-sleep first hit may still return 200 after the retry
          if [ "$code" -ge 200 ] && [ "$code" -lt 400 ]; then
            echo "keep-alive OK"
          else
            echo "keep-alive got HTTP $code (backend may have been waking up)"
          fi
